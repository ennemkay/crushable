services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://crushable:crushable@db:5432/crushable?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: development-secret-change-me
      APP_BASE_URL: http://localhost:3000
    command: sh -c "npm run prisma:deploy && npm start"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crushable
      POSTGRES_PASSWORD: crushable
      POSTGRES_DB: crushable
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crushable -d crushable"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
